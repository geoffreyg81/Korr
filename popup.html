<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zéro Friction</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <span class="logo">✓</span>
        <div class="header-copy">
          <h1>Zéro Friction <span class="version">v0.5.0</span></h1>
          <p>Correcteur français, hors ligne.</p>
        </div>
      </header>

      <div id="backend-state" class="backend-state is-local">Vérification…</div>

      <section class="site-setting" aria-labelledby="site-setting-title">
        <div class="site-setting-copy">
          <strong id="site-setting-title">Bouton ✓ sur ce site</strong>
          <span id="current-site">Détection du site…</span>
        </div>
        <label class="switch" title="Afficher le bouton sur ce site">
          <input id="site-enabled" type="checkbox">
          <span class="switch-track" aria-hidden="true"></span>
        </label>
      </section>

      <fieldset id="style-picker" class="style-picker">
        <legend>Style de réponse</legend>
        <div class="style-chips">
          <label class="chip"><input type="radio" name="style" value="corriger"><span>✓ Corriger</span></label>
          <label class="chip"><input type="radio" name="style" value="professionnel"><span>💼 Pro</span></label>
          <label class="chip"><input type="radio" name="style" value="amical"><span>😊 Amical</span></label>
          <label class="chip"><input type="radio" name="style" value="concis"><span>✂️ Concis</span></label>
        </div>
        <p id="style-hint" class="style-hint"></p>
      </fieldset>

      <p id="status" role="status" aria-live="polite"></p>

      <footer>
        Tout se passe sur ton ordinateur : aucun texte n’est envoyé sur Internet.<br>
        Sélectionne du texte ou clique dans un champ, puis <strong>✓</strong> ou
        <kbd>Alt</kbd>+<kbd>Maj</kbd>+<kbd>C</kbd>.
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
